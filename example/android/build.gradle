buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

// Dev-only (plan §3.6): with `Galva_androidCore=true` the library pulls the
// unreleased io.galva.sdk:galva-sdk SNAPSHOT — resolvable only from a local
// publish (`publishToMavenLocal` in galva-android). Every project resolving
// the app's classpath needs the repo, hence allprojects.
if ((findProperty("Galva_androidCore") ?: "false").toString().toBoolean()) {
    allprojects {
        repositories {
            mavenLocal()
        }
    }
}
