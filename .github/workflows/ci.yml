# CI for @galva/react-native.
#
#   • js       — always-on gates: strict typecheck, lint, bridge-contract guard,
#                bob/plugin build, plugin tests. No native toolchain needed.
#   • ios      — native gate: pod install + build the example app (vendored Swift
#                core + bridge + auto-wire) and the swizzler unit + E2E tests.
#   • expo-l1  — Expo integration, fast: runs a real `expo prebuild` on the
#                committed fixture and asserts the generated native config. PR gate.
#   • expo-l2  — Expo integration, deep: native-builds the prebuilt Expo app and
#                verifies the deep-link scheme routes at runtime. Nightly + manual
#                (heavy), not a PR gate.
#
# The iOS core compiles against the iOS 26 SDK (Xcode 26), so any native build's
# React Native must be a version that also supports that toolchain (clang 21).

name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 7 * * *' # nightly — exercises the heavy expo-l2 native build
  workflow_dispatch: # manual trigger for expo-l2

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js:
    name: JS (typecheck · lint · bridge · build · plugin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # No --ignore-scripts: bun (devDependency) sets up its binary on install,
      # and `prepare` builds lib + plugin. check:bridge and test:plugin run on bun.
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run check:bridge
      - run: npm run build
      # Expo config-plugin transforms (deep-link scheme registration, etc.)
      - run: npm run test:plugin
      # Log formatting/routing helpers (console mapping + custom-logger routing).
      - run: npm run test:logging

  ios:
    name: iOS (example pod install + build)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26 (required by the Galva iOS core)
        run: |
          XCODE="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)"
          [ -z "$XCODE" ] && XCODE="$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          echo "Selecting $XCODE"
          sudo xcode-select -switch "$XCODE"
          xcodebuild -version

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Installs the workspace (example deps + links the local package) and runs
      # prepare (bob build + tsc -p plugin).
      - name: Install
        run: npm ci

      # Deterministic proof the push auto-wiring swizzler is safe (opt-out,
      # chaining, completion-handler-once, idempotency, coexistence).
      - name: Swizzler unit tests (auto-wiring)
        run: npm run test:ios

      - name: Pod install
        run: cd example/ios && pod install

      - name: Build example (simulator)
        run: |
          cd example/ios
          xcodebuild build \
            -workspace GalvaExample.xcworkspace \
            -scheme GalvaExample \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

      # Real-world proof: run the swizzler INSIDE the example app, through the
      # real application lifecycle, against the real Galva pod, alongside a live
      # OneSignal-style competitor swizzler — both load orders, completion-once.
      # (The unit tests above prove the logic deterministically; this proves the
      # real-launch install + framework coexistence.)
      - name: Swizzler E2E (real app lifecycle + competitor coexistence)
        run: npm run test:ios:e2e

  # L1 — Expo integration, deterministic + device-free. Packs the SDK, installs
  # it into the committed Expo fixture exactly as a consumer would, runs a real
  # `expo prebuild`, and asserts the generated native config (deep-link scheme
  # registered on both platforms; no push config injected). Runs on every PR.
  expo-l1:
    name: Expo (prebuild config assertions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:expo:prebuild

  # L2 — Expo integration, runtime. Native-builds the prebuilt Expo app (proves
  # SDK ↔ Expo native-build compatibility) and verifies the plugin-registered
  # deep-link scheme routes a gv:// URL to the app on a simulator. Heavy, so it's
  # nightly + manual only — not a PR gate.
  expo-l2:
    name: Expo (runtime deep-link smoke)
    runs-on: macos-15
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26 (required by the Galva iOS core)
        run: |
          XCODE="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)"
          [ -z "$XCODE" ] && XCODE="$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          echo "Selecting $XCODE"
          sudo xcode-select -switch "$XCODE"
          xcodebuild -version

      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run test:expo:runtime

      - name: Upload Expo runtime artifacts (screenshot + log)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expo-runtime-artifacts
          path: e2e/expo/.artifacts
          if-no-files-found: ignore
