name: Release
# Manually-triggered release: bumps the version, tags, creates the GitHub
# release (auto-generated notes) and publishes to npm — all via release-it
# (.release-it.json; quality gates run in its before:init hooks, and `npm
# publish` itself rebuilds through the `prepare` script).
#
# Prerequisites (one-time):
#   - `NPM_TOKEN` repo secret: npm automation token with publish rights for
#     the @galva scope.
#   - First publish gate (plan §7 Phase 3): hold until galva-ios cuts its
#     first release tag, then re-pin the vendored core by tag beforehand.
on:
  workflow_dispatch:
    inputs:
      increment:
        description: Version increment
        type: choice
        required: true
        default: patch
        options: [patch, minor, major, prerelease]
      version:
        description: Exact version (overrides increment — e.g. "0.1.0" for the first publish)
        type: string
        required: false

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the release commit + tag, create the GitHub release
      id-token: write # npm provenance
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0 # release-it inspects history

      - name: Setup
        uses: ./.github/actions/setup

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Authenticate npm
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Release
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            npx release-it "${{ inputs.version }}" --ci --npm.publishArgs=--provenance
          else
            npx release-it --ci --increment "${{ inputs.increment }}" --npm.publishArgs=--provenance
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
